{% extends "base.html" %}

{% block title %}Корзина{% endblock %}

{% block content %}
<div class="cart-page">
    <h1>Корзина</h1>

    <div class="cart-layout">
        <div class="cart-items">
            <h2>Список товаров</h2>

            {# Здесь будет цикл по товарам корзины #}
            <p class="empty-cart-message">Ваша корзина пуста</p>
        </div>

        <div class="checkout-section">
            <h2>Оформление заказа</h2>

            <form method="POST" class="checkout-form">
                {{ form.hidden_tag() }}

                <div class="form-group">
                    <label>Куда доставить:</label>
                    <input type="text" name="city" placeholder="Город" class="form-control">
                    <input type="text" name="address" placeholder="Улица, дом, квартира" class="form-control">
                    <input type="text" name="postal_code" placeholder="Почтовый индекс" class="form-control">
                </div>

                <div class="form-group">
                    <label>Как оплатить:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="payment_method" value="card" checked> Картой</label>
                        <label><input type="radio" name="payment_method" value="cash"> Наличными</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Контактные данные:</label>
                    <input type="tel" name="phone" placeholder="Телефон" class="form-control">
                    <input type="email" name="email" placeholder="Email" class="form-control">
                </div>

                <div class="cart-total">
                    <h3>Итоговая сумма: <span class="total-amount">0 ₽</span></h3>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-large">Оплатить</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
